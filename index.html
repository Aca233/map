<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOI4 风格交互地图</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <div id="hud-top-bar" class="hud-shell hud-shell-top">
      <div class="hud-top-left">
        <div class="hud-chip hud-chip-fps" id="fps-counter">FPS: --</div>
        <div class="hud-chip">模式: <span id="hud-map-mode">政治</span></div>
      </div>
      <div class="hud-top-center">
        <div class="hud-resource-strip" role="presentation">
          <span class="resource-pill">政治点数 120</span>
          <span class="resource-pill">人力 1.20M</span>
          <span class="resource-pill">工厂 58/43</span>
          <span class="resource-pill">补给 98%</span>
        </div>
      </div>
      <div class="hud-top-right">
        <div class="hud-chip">Tick <span id="hud-runtime-tick">0</span></div>
        <div class="hud-chip">时间 <span id="hud-runtime-time">00:00:00</span></div>
      </div>
    </div>

    <div id="tooltip"></div>

    <div id="province-panel">
      <h3 id="panel-title">地块名称</h3>
      <div class="info-row">
        <span class="info-label">归属国</span>
        <span class="info-value" id="panel-owner">
          <span class="country-color" id="panel-country-color"></span>
          <span id="panel-country-name">--</span>
        </span>
      </div>
      <div class="info-row">
        <span class="info-label">行政区</span>
        <span class="info-value" id="panel-state-name">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">行政区类别</span>
        <span class="info-value" id="panel-state-category">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">行政区人口</span>
        <span class="info-value" id="panel-state-manpower">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">核心领土</span>
        <span class="info-value" id="panel-state-cores">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">海域</span>
        <span class="info-value" id="panel-strategic-region">--</span>
      </div>
      <div class="info-row" style="border-top: 1px solid rgba(100,140,200,0.2); padding-top: 6px; margin-top: 4px;">
        <span class="info-label">地块 ID</span>
        <span class="info-value" id="panel-id">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">地形</span>
        <span class="info-value" id="panel-terrain">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">人口</span>
        <span class="info-value" id="panel-population">--</span>
      </div>
    </div>

    <div id="hud-bottom-strip" class="hud-shell hud-shell-bottom">
      <div class="hud-bottom-left">
        <div class="hud-chip">固定步长 <span id="hud-runtime-step">0.200s</span></div>
      </div>

      <div id="map-mode-bar">
        <button class="map-mode-btn active" data-mode="political">政治</button>
        <button class="map-mode-btn" data-mode="state">行政区</button>
        <button class="map-mode-btn" data-mode="terrain">地形</button>
        <button class="map-mode-btn" data-mode="heightmap">高度</button>
      </div>

      <div class="hud-bottom-right">
        <div id="layer-toggles">
          <label class="layer-toggle-row">
            <input id="toggle-city-scatter" type="checkbox" checked />
            <span>城市散布</span>
          </label>
          <label class="layer-toggle-row">
            <input id="toggle-buildings" type="checkbox" checked />
            <span>建筑</span>
          </label>
          <label class="layer-toggle-row">
            <input id="toggle-city-lights" type="checkbox" checked />
            <span>城市灯光</span>
          </label>
        </div>
        <div class="hud-chip hud-hint" id="hud-shortcut-hint">WASD 移动 · 鼠标拖拽旋转</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
